<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Notice Board</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Segoe UI,sans-serif;
        }

        body{
            min-height:100vh;
            background:linear-gradient(135deg,#667eea,#764ba2,#00c6ff);
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{
            display:flex;
            gap:30px;
            align-items:flex-start;
        }

        .box,.table-box{
            background:rgba(255,255,255,0.18);
            backdrop-filter:blur(15px);
            padding:30px;
            border-radius:25px;
            box-shadow:0 8px 32px rgba(0,0,0,0.25);
            color:white;
        }

        .box{
            width:430px;
        }

        .table-box{
            width:750px;
        }

        h1,h2{
            text-align:center;
            margin-bottom:20px;
        }

        input,textarea{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:none;
            border-radius:10px;
            outline:none;
        }

        textarea{
            height:120px;
            resize:none;
        }

        button{
            width:100%;
            padding:13px;
            border:none;
            border-radius:12px;
            background:white;
            color:#4f46e5;
            font-weight:bold;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#4f46e5;
            color:white;
        }

        table{
            width:100%;
            border-collapse:collapse;
            background:white;
            color:#333;
            border-radius:12px;
            overflow:hidden;
        }

        th{
            background:#4f46e5;
            color:white;
            padding:12px;
        }

        td{
            padding:12px;
            border-bottom:1px solid #ddd;
            text-align:center;
        }

        tr:hover{
            background:#f2f2f2;
        }

        a{
            display:block;
            text-align:center;
            margin-top:20px;
            color:white;
            text-decoration:none;
            font-weight:bold;
        }

    </style>

</head>

<body>

<div class="container">

    <div class="box">

        <h1>📢 Notice Board</h1>

        <form action="/saveNotice" method="post">

            <input
                type="text"
                name="title"
                placeholder="Notice Title"
                required>

            <textarea
                name="message"
                placeholder="Notice Message"
                required></textarea>

            <button type="submit">
                Post Notice
            </button>

        </form>

        <a href="/">⬅ Back to Home</a>

    </div>

    <div class="table-box">

        <h2>📋 Posted Notices</h2>

        <table>

            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Message</th>
            </tr>

            <tr th:each="notice : ${notices}">
                <td th:text="${notice.id}"></td>
                <td th:text="${notice.title}"></td>
                <td th:text="${notice.message}"></td>
            </tr>

        </table>

    </div>

</div>

</body>
</html>
