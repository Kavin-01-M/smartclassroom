<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Assignment Management</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Segoe UI,sans-serif;
        }

        body{
            min-height:100vh;
            background:linear-gradient(135deg,#667eea,#764ba2,#00c6ff);
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{
            display:flex;
            gap:30px;
            align-items:flex-start;
        }

        .box,.table-box{
            background:rgba(255,255,255,0.18);
            backdrop-filter:blur(15px);
            padding:30px;
            border-radius:25px;
            box-shadow:0 8px 32px rgba(0,0,0,0.25);
            color:white;
        }

        .box{
            width:430px;
        }

        .table-box{
            width:760px;
        }

        h1,h2{
            text-align:center;
            margin-bottom:20px;
        }

        label{
            font-weight:bold;
        }

        input,textarea{
            width:100%;
            padding:12px;
            margin:8px 0 18px;
            border:none;
            border-radius:10px;
            outline:none;
        }

        textarea{
            height:100px;
            resize:none;
        }

        button{
            width:100%;
            padding:13px;
            border:none;
            border-radius:12px;
            background:white;
            color:#4f46e5;
            font-size:16px;
            font-weight:bold;
            cursor:pointer;
        }

        button:hover{
            background:#4f46e5;
            color:white;
        }

        table{
            width:100%;
            border-collapse:collapse;
            background:white;
            color:#333;
            border-radius:12px;
            overflow:hidden;
        }

        th{
            background:#4f46e5;
            color:white;
            padding:12px;
        }

        td{
            padding:10px;
            text-align:center;
            border-bottom:1px solid #ddd;
        }

        tr:hover{
            background:#f5f5f5;
        }

        a{
            display:block;
            text-align:center;
            margin-top:20px;
            color:white;
            text-decoration:none;
            font-weight:bold;
        }
    </style>

</head>

<body>

<div class="container">

    <div class="box">

        <h1>📝 Assignment</h1>

        <form action="/saveAssignment" method="post">

            <label>Assignment Title</label>
            <input type="text"
                   name="title"
                   placeholder="Enter Assignment Title"
                   required>

            <label>Description</label>
            <textarea
                    name="description"
                    placeholder="Enter Assignment Description"
                    required></textarea>

            <label>Due Date</label>
            <input type="date"
                   name="dueDate"
                   required>

            <button type="submit">
                ➕ Add Assignment
            </button>

        </form>

        <a href="/">⬅ Back to Home</a>

    </div>

    <div class="table-box">

        <h2>📋 Assignment Records</h2>

        <table>

            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Description</th>
                <th>Due Date</th>
            </tr>

            <tr th:each="assignment : ${assignments}">
                <td th:text="${assignment.id}"></td>
                <td th:text="${assignment.title}"></td>
                <td th:text="${assignment.description}"></td>
                <td th:text="${assignment.dueDate}"></td>
            </tr>

        </table>

    </div>

</div>

</body>
</html>
