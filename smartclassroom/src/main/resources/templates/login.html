<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Smart Classroom Login</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;

            background:
                linear-gradient(rgba(0,0,0,0.50), rgba(0,0,0,0.50)),
                url('/images/background.jpg');

            background-size:cover;
            background-position:center;
            background-repeat:no-repeat;
        }

        .login-box{
            width:420px;
            padding:40px;
            border-radius:25px;

            background:rgba(255,255,255,0.15);
            backdrop-filter:blur(18px);
            -webkit-backdrop-filter:blur(18px);

            border:1px solid rgba(255,255,255,0.35);
            box-shadow:0 8px 32px rgba(0,0,0,0.35);

            color:white;
            text-align:center;
        }

        h1{
            font-size:34px;
            margin-bottom:10px;
        }

        h3{
            font-weight:400;
            margin-bottom:30px;
        }

        label{
            display:block;
            text-align:left;
            margin-bottom:8px;
            font-weight:bold;
        }

        input{
            width:100%;
            padding:13px;
            border:none;
            border-radius:12px;
            margin-bottom:20px;
            outline:none;
            font-size:15px;
        }

        button{
            width:100%;
            padding:14px;
            border:none;
            border-radius:12px;
            background:white;
            color:#4f46e5;
            font-size:17px;
            font-weight:bold;
            cursor:pointer;
        }

        button:hover{
            background:#4f46e5;
            color:white;
        }

        .error{
            margin-top:18px;
            color:#ffdddd;
            font-weight:bold;
        }
    </style>
</head>

<body>

<div class="login-box">
    <h1>🏫 Smart Classroom</h1>
    <h3>Management System</h3>

    <form action="/login" method="post">

        <label>Username</label>
        <input type="text" name="username" placeholder="Enter Username" required>

        <label>Password</label>
        <input type="password" name="password" placeholder="Enter Password" required>

        <button type="submit">🔐 Login</button>
    </form>

    <div class="error" th:text="${error}"></div>
</div>

</body>
</html>
